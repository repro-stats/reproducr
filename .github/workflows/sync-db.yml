name: Sync breaking-changes database

on:
  workflow_dispatch:   # manual only — disabled until sync_db.R is fixed
  # repository_dispatch:
  #   types: [db-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install jsonlite
        run: Rscript -e "install.packages('jsonlite')"

      - name: Clone reproducr-db
        run: |
          git clone https://github.com/reproducr-dev/reproducr-db \
            ../reproducr-db

      - name: Run sync_db.R
        run: Rscript data-raw/sync_db.R

      - name: Commit updated database
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add R/breaking_changes_db.R
          git diff --staged --quiet || \
            git commit -m "chore: sync breaking_changes_db.R from reproducr-db [skip ci]"
          git push