name: Reproducibility audit

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'   # Weekly on Monday at 06:00 UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read-only — no commit step needed

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install reproducr
        run: Rscript -e "install.packages('.', repos = NULL, type = 'source')"

      - name: Run reproducibility audit
        run: |
          Rscript -e "
            library(reproducr)
            # The package source itself has no analysis code to audit.
            # A placeholder script is used so the workflow validates that
            # reproducr installs and runs correctly on every push.
            # The badge in README.md is hardcoded green and points to the
            # example repos for live demonstration.
            script <- tempfile(fileext = '.R')
            writeLines('# reproducr package audit placeholder', script)
            report <- audit_script(script, renv = FALSE, verbose = FALSE)
            risks  <- risk_score(report)
            print(risks)
          "